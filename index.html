<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banff Road Trip Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;800&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c1116; --panel:#121a21; --panel2:#17212a; --border:#26333e;
    --text:#e8eef2; --muted:#7d93a3; --accent:#5fc9b8; --accent2:#e0a458;
    --danger:#d9706a; --lake:#4f9fd9; --canyon:#c97b4a; --restaurant:#e0a458; --hotel:#a587d9; --stop:#5fc9b8; --food:#d96a8f;
    --disp:'Big Shoulders Display',sans-serif; --mono:'IBM Plex Mono',monospace; --body:'Inter',-apple-system,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;font-family:var(--body);background:var(--bg);color:var(--text);}
  #lockscreen{position:fixed;inset:0;background:
      repeating-radial-gradient(circle at 20% 30%, transparent 0, transparent 38px, rgba(95,201,184,0.05) 39px, rgba(95,201,184,0.05) 40px),
      var(--bg);
    display:flex;align-items:center;justify-content:center;z-index:9999;}
  #lockbox{background:var(--panel);padding:36px 30px;border-radius:4px;border:1px solid var(--border);width:300px;text-align:center;border-top:3px solid var(--accent);}
  #lockbox h2{margin:0 0 6px;font-family:var(--disp);font-weight:800;font-size:26px;letter-spacing:0.3px;text-transform:uppercase;}
  #lockbox p{color:var(--muted);font-size:12px;margin:0 0 20px;}
  #lockbox input{width:100%;padding:10px 12px;border-radius:3px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;margin-bottom:10px;}
  #lockbox button{width:100%;padding:10px;border-radius:3px;border:none;background:var(--accent);color:#0b1116;font-weight:700;cursor:pointer;font-size:12px;letter-spacing:1px;text-transform:uppercase;}
  #lockbox button:hover{background:#74d6c6;}
  #lockerr{color:var(--danger);font-size:11px;height:16px;margin-top:8px;font-family:var(--mono);}

  #app{display:none;height:100%;}
  #app.show{display:flex;}
  #sidebar{width:340px;min-width:340px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  #map{flex:1;}
  .sb-header{padding:18px 16px 12px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
  .sb-header::before{content:"";position:absolute;inset:0;background:
      repeating-radial-gradient(circle at 90% -20%, transparent 0, transparent 14px, rgba(95,201,184,0.06) 15px, rgba(95,201,184,0.06) 16px);
    pointer-events:none;}
  .sb-header h1{font-family:var(--disp);font-weight:800;font-size:21px;margin:0 0 4px;letter-spacing:0.4px;text-transform:uppercase;position:relative;}
  .sb-header .sub{font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:0.2px;position:relative;}
  .tabs{display:flex;border-bottom:1px solid var(--border);}
  .tab{flex:1;padding:11px 4px;text-align:center;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tabpanel{display:none;flex:1;overflow-y:auto;padding:14px;}
  .tabpanel.active{display:block;}

  .day-card{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:3px;padding:12px 14px;margin-bottom:10px;}
  .day-card .dtitle{font-family:var(--disp);font-weight:700;font-size:15px;color:var(--accent2);margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase;}
  .day-card .route{font-size:13px;line-height:1.6;}
  .day-card .leg{font-size:11px;color:var(--muted);margin:2px 0 8px 10px;font-family:var(--mono);}
  .meals{margin-top:9px;padding-top:9px;border-top:1px dashed var(--border);}
  .meal-row{display:flex;gap:8px;align-items:baseline;font-size:11px;margin-bottom:5px;}
  .meal-tag{flex-shrink:0;width:84px;color:var(--accent2);font-weight:600;font-family:var(--mono);font-size:10px;text-transform:uppercase;}
  .meal-note{color:var(--muted);}

  .poi-item{background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s;}
  .poi-item:hover{border-color:var(--accent);}
  .poi-item .row{display:flex;justify-content:space-between;align-items:center;}
  .poi-item .name{font-weight:600;font-size:13px;}
  .poi-item .cat{font-size:9px;padding:3px 8px;border-radius:2px;color:#0b1116;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;}
  .poi-item .note{font-size:12px;color:var(--muted);margin-top:5px;white-space:pre-wrap;}
  .poi-item .cost{font-size:12px;color:var(--accent2);margin-top:5px;font-weight:600;font-family:var(--mono);}

  .cat-lake{background:var(--lake);} .cat-canyon{background:var(--canyon);}
  .cat-restaurant{background:var(--restaurant);} .cat-hotel{background:var(--hotel);} .cat-stop{background:var(--stop);} .cat-food{background:var(--food);}

  .empty{color:var(--muted);font-size:12px;text-align:center;padding:34px 10px;line-height:1.6;}

  .budget-total{background:var(--panel2);border:1px solid var(--border);border-top:3px solid var(--accent2);border-radius:3px;padding:18px;margin-bottom:14px;text-align:center;}
  .budget-total .num{font-family:var(--disp);font-size:36px;font-weight:800;color:var(--accent2);letter-spacing:0.5px;}
  .budget-total .lbl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
  .budget-row{display:flex;justify-content:space-between;font-size:12px;padding:8px 0;border-bottom:1px solid var(--border);}
  .budget-row .bname{color:var(--text);}
  .budget-row .bamt{color:var(--accent2);font-weight:600;font-family:var(--mono);}

  .addbtn{display:block;width:100%;padding:10px;border-radius:3px;border:1px dashed var(--border);background:transparent;color:var(--muted);font-size:11px;letter-spacing:0.3px;cursor:pointer;margin-bottom:12px;}
  .addbtn:hover{border-color:var(--accent);color:var(--accent);}

  /* popup edit form */
  .leaflet-popup-content-wrapper{background:var(--panel2);color:var(--text);border-radius:4px;border:1px solid var(--border);}
  .leaflet-popup-tip{background:var(--panel2);}
  .pf{min-width:220px;}
  .pf label{display:block;font-size:9px;color:var(--muted);margin:7px 0 3px;letter-spacing:0.5px;text-transform:uppercase;}
  .pf input,.pf select,.pf textarea{width:100%;padding:6px 8px;border-radius:3px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;font-family:var(--body);}
  .pf textarea{min-height:50px;resize:vertical;}
  .pf .pfbtns{display:flex;gap:6px;margin-top:9px;}
  .pf button{flex:1;padding:7px;border-radius:3px;border:none;font-size:11px;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;font-weight:700;}
  .pf .save{background:var(--accent);color:#0b1116;}
  .pf .del{background:var(--danger);color:#fff;}

  .hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(18,26,33,0.95);border:1px solid var(--border);padding:8px 16px;border-radius:3px;font-size:11px;font-family:var(--mono);color:var(--muted);z-index:500;pointer-events:none;letter-spacing:0.2px;}

  ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  .map-legend{background:rgba(18,26,33,0.95);border:1px solid var(--border);border-radius:3px;padding:10px 12px;font-family:var(--body);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.4);}
  .leg-title{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .leg-row{display:flex;align-items:center;gap:7px;font-size:11px;margin-bottom:4px;}
  .leg-row:last-child{margin-bottom:0;}
  .leg-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}
  .leg-line{width:14px;height:3px;border-radius:2px;display:inline-block;flex-shrink:0;}
</style>
</head>
<body>

<div id="lockscreen">
  <div id="lockbox">
    <h2>Banff Trip</h2>
    <p>Private map — enter password to continue</p>
    <input type="password" id="pwinput" placeholder="Password" autofocus>
    <button onclick="tryUnlock()">Unlock</button>
    <div id="lockerr"></div>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sb-header">
      <h1>Banff Trip</h1>
      <div class="sub">VAN → HINTON/JASPER → CANMORE → BANFF → REVELSTOKE → KELOWNA → VAN</div>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="itinerary">Itinerary</div>
      <div class="tab" data-tab="places">Places</div>
      <div class="tab" data-tab="budget">Budget</div>
    </div>

    <div class="tabpanel active" id="tab-itinerary"></div>

    <div class="tabpanel" id="tab-places">
      <button class="addbtn" onclick="alert('Click anywhere on the map to drop a pin, choose a category, then save.')">+ Click the map to add a place</button>
      <div id="placesList"></div>
    </div>

    <div class="tabpanel" id="tab-budget">
      <div class="budget-total">
        <div class="num" id="budgetTotal">$0</div>
        <div class="lbl">Total spent across all places</div>

      </div>
      <div id="budgetList"></div>
    </div>
  </div>
  <div id="map"></div>
  <div class="hint">Click map to add a pin · Click a pin to edit notes & cost</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
/* ====================== PASSWORD GATE ======================
   Client-side only — fine for keeping casual visitors out of a
   private trip-planning page, NOT real security. Change PASSWORD_HASH
   by setting a new password below before you publish. */
const APP_PASSWORD = "banff2026"; // <-- CHANGE THIS before publishing

function tryUnlock(){
  const v = document.getElementById('pwinput').value;
  if(v === APP_PASSWORD){
    document.getElementById('lockscreen').style.display='none';
    document.getElementById('app').classList.add('show');
    sessionStorage.setItem('unlocked','1');
    initMap();
  } else {
    document.getElementById('lockerr').textContent = 'Incorrect password';
  }
}
document.getElementById('pwinput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
if(sessionStorage.getItem('unlocked')==='1'){
  document.getElementById('lockscreen').style.display='none';
  document.getElementById('app').classList.add('show');
  window.addEventListener('DOMContentLoaded', initMap);
}

/* ====================== TRIP DATA ====================== */
const stops = [
  {name:"Burnaby", lat:49.2488, lng:-122.9805, day:1, role:"start"},
  {name:"Coquitlam", lat:49.2838, lng:-122.7932, day:1, role:"waypoint"},
  {name:"Kamloops", lat:50.6745, lng:-120.3273, day:1, role:"waypoint"},
  {name:"Hinton", lat:53.3991, lng:-117.5794, day:1, role:"overnight"},
  {name:"Jasper", lat:52.8733, lng:-118.0823, day:2, role:"waypoint"},
  {name:"Canmore", lat:51.0884, lng:-115.3479, day:2, role:"overnight"},
  {name:"Banff", lat:51.1784, lng:-115.5708, day:3, role:"overnight"},
  {name:"Banff (day 4)", lat:51.1784, lng:-115.5708, day:4, role:"waypoint"},
  {name:"Revelstoke", lat:50.9981, lng:-118.1957, day:4, role:"overnight"},
  {name:"Kelowna", lat:49.8863, lng:-119.4966, day:5, role:"waypoint"},
  {name:"Burnaby (return)", lat:49.2488, lng:-122.9805, day:5, role:"end"},
];

// Rough estimated driving legs (edit freely — these are ballpark highway estimates)
const legs = [
  {from:"Burnaby", to:"Coquitlam", time:"~25 min", dist:"20 km"},
  {from:"Coquitlam", to:"Kamloops", time:"~3 hr 45 min", dist:"345 km"},
  {from:"Kamloops", to:"Hinton", time:"~5 hr 30 min", dist:"525 km"},
  {from:"Hinton", to:"Jasper", time:"~1 hr 10 min", dist:"85 km"},
  {from:"Jasper", to:"Canmore", time:"~7-9 hr w/ stops (4 hr driving)", dist:"290 km"},
  {from:"Canmore", to:"Banff", time:"~25 min", dist:"25 km"},
  {from:"Banff", to:"Revelstoke", time:"~2 hr 45 min", dist:"265 km"},
  {from:"Revelstoke", to:"Kelowna", time:"~2 hr 15 min", dist:"200 km"},
  {from:"Kelowna", to:"Burnaby", time:"~4 hr", dist:"395 km"},
];

// Day 2 sightseeing stops in order, Hinton/Jasper -> Canmore
const day2Stops = ["Pyramid Lake","Patricia Lake","Medicine Lake","Athabasca Falls","Maligne Lake","Athabasca Glacier (Icefield Centre)","Waterfowl Lake","Mistaya Canyon"];

// Meal plan per day — swap "dine out" for fast food / hotel breakfast / snacks anytime, it's just a placeholder plan
const meals = {
  1: [
    {meal:"Breakfast/snacks", note:"Snacks or sandwiches in the car, early start from Burnaby"},
    {meal:"Lunch/Brunch", note:"Kamloops — dine out or quick stop"},
    {meal:"Dinner", note:"Hinton or Jasper, depending on which one you stay in"},
  ],
  2: [
    {meal:"Breakfast", note:"Hinton or Jasper (wherever you stayed)"},
    {meal:"Lunch", note:"Snacks in the car along Icefields Parkway"},
    {meal:"Dinner", note:"Banff or Canmore"},
  ],
  3: [
    {meal:"Breakfast", note:"Banff or Canmore"},
    {meal:"Lunch", note:"In the car / quick bite"},
    {meal:"Dinner", note:"Banff or Canmore"},
  ],
  4: [
    {meal:"Breakfast", note:"Banff or Canmore"},
    {meal:"Lunch", note:"In the car, en route to Revelstoke"},
    {meal:"Dinner", note:"Revelstoke (arrive evening)"},
  ],
  5: [
    {meal:"Breakfast", note:"Revelstoke"},
    {meal:"Lunch", note:"Kelowna"},
    {meal:"Dinner", note:"Back home — Coquitlam or Burnaby"},
  ],
};

const CATS = {
  stop: {label:"Trip Stop", color:"#4fb3a9"},
  lake: {label:"Lake", color:"#4f9fd9"},
  canyon: {label:"Canyon", color:"#c97b4a"},
  restaurant: {label:"Restaurant", color:"#e3a857"},
  food: {label:"Quick/Fast Food", color:"#d96a8f"},
  hotel: {label:"Hotel", color:"#9b7fd9"},
};

/* ====================== STORAGE ====================== */
const STORE_KEY = "banffTripPlaces_v1";
function loadPlaces(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }catch(e){ return []; }
}
function savePlaces(places){ localStorage.setItem(STORE_KEY, JSON.stringify(places)); }
let places = loadPlaces();

// Day 2 Jasper-area stops you listed — merged in once, then fully editable (notes/cost) like any pin
const presetPOIs = [
  {id:"preset-pyramid", name:"Pyramid Lake", cat:"lake", note:"", cost:0, lat:52.9235246, lng:-118.0988788},
  {id:"preset-patricia", name:"Patricia Lake", cat:"lake", note:"", cost:0, lat:52.9040287, lng:-118.1012056},
  {id:"preset-medicine", name:"Medicine Lake", cat:"lake", note:"", cost:0, lat:52.8543347, lng:-117.757241},
  {id:"preset-athafalls", name:"Athabasca Falls", cat:"canyon", note:"", cost:0, lat:52.664437, lng:-117.8837673},
  {id:"preset-maligne", name:"Maligne Lake", cat:"lake", note:"", cost:0, lat:52.6654279, lng:-117.5345287},
  {id:"preset-athaglacier", name:"Athabasca Glacier (Icefield Centre)", cat:"canyon", note:"", cost:0, lat:52.2203483, lng:-117.2242371},
  {id:"preset-waterfowl", name:"Waterfowl Lake", cat:"lake", note:"", cost:0, lat:51.8317285, lng:-116.6141708},
  {id:"preset-mistaya", name:"Mistaya Canyon", cat:"canyon", note:"", cost:0, lat:51.9412558, lng:-116.7176194},
];
presetPOIs.forEach(p=>{
  if(!places.find(existing=>existing.id===p.id)) places.push(p);
});
savePlaces(places);

// Day 1 route waypoints, in your requested order — actual road geometry fetched live via OSRM
const day1Waypoints = [
  {name:"Burnaby", lat:49.2488, lng:-122.9805},
  {name:"Coquitlam", lat:49.2838, lng:-122.7932},
  {name:"Kamloops", lat:50.6745, lng:-120.3273},
  {name:"Jasper", lat:52.8733, lng:-118.0823},
  {name:"Hinton", lat:53.3991, lng:-117.5794},
];

/* ====================== MAP ====================== */
let map, markersLayer;
function initMap(){
  if(map) return;
  map = L.map('map', {zoomControl:true}).setView([51.2, -118.5], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 18
  }).addTo(map);

  markersLayer = L.layerGroup().addTo(map);

  drawRoadRoute(day1Waypoints, '#e0a458', 'Day 1: Burnaby → Coquitlam → Kamloops → Jasper → Hinton');

  // Trip stop markers (fixed, not editable/deletable)
  stops.forEach(s=>{
    const m = L.circleMarker([s.lat,s.lng], {
      radius:8, color:'#0b1116', weight:2, fillColor: CATS.stop.color, fillOpacity:1
    }).addTo(map);
    m.bindPopup(`<b>${s.name}</b><br><span style="color:#8fa1b3;font-size:11px;">Day ${s.day} · ${s.role}</span>`);
  });

  // Click map to add a custom POI
  map.on('click', (e)=>{ openNewPlaceForm(e.latlng); });

  addLegend();

  renderItinerary();
  renderPlaces();
  renderBudget();
}

/* Fetch real road-snapped route from OSRM (free, public, no API key) and draw it */
// Multiple free, no-key public OSRM-compatible routing servers — tried in order
const ROUTE_SERVERS = [
  'https://router.project-osrm.org/route/v1/driving/',
  'https://routing.openstreetmap.de/routed-car/route/v1/driving/',
];

function fetchWithTimeout(url, ms){
  return Promise.race([
    fetch(url),
    new Promise((_, reject)=> setTimeout(()=> reject(new Error('timeout')), ms))
  ]);
}

async function fetchRouteWithFallback(coordStr){
  for(const base of ROUTE_SERVERS){
    try{
      const res = await fetchWithTimeout(`${base}${coordStr}?overview=full&geometries=geojson`, 8000);
      if(!res.ok) continue;
      const data = await res.json();
      if(data.routes && data.routes[0]) return data;
    }catch(err){
      console.warn(`Routing server failed (${base}):`, err.message);
    }
  }
  return null;
}

async function drawRoadRoute(waypoints, color, label){
  const coordStr = waypoints.map(w=>`${w.lng},${w.lat}`).join(';');
  const data = await fetchRouteWithFallback(coordStr);
  if(data){
    const coords = data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]); // lng,lat -> lat,lng
    const line = L.polyline(coords, {color, weight:4, opacity:0.85}).addTo(map);
    line.bindPopup(`<b>${label}</b>`);
    map.fitBounds(line.getBounds(), {padding:[40,40]});
  } else {
    console.warn('All routing servers failed, falling back to straight segments for:', label);
    L.polyline(waypoints.map(w=>[w.lat,w.lng]), {color, weight:3, opacity:0.6, dashArray:'4 6'}).addTo(map)
      .bindPopup(`<b>${label}</b><br><span style="color:#7d93a3;font-size:11px;">(live routing unavailable right now — straight line shown, try reloading later)</span>`);
  }
}

function addLegend(){
  const legend = L.control({position:'bottomright'});
  legend.onAdd = function(){
    const div = L.DomUtil.create('div', 'map-legend');
    div.innerHTML = `
      <div class="leg-title">Legend</div>
      <div class="leg-row"><span class="leg-dot" style="background:${CATS.stop.color}"></span>Trip stop</div>
      <div class="leg-row"><span class="leg-dot" style="background:${CATS.lake.color}"></span>Lake</div>
      <div class="leg-row"><span class="leg-dot" style="background:${CATS.canyon.color}"></span>Canyon</div>
      <div class="leg-row"><span class="leg-dot" style="background:${CATS.restaurant.color}"></span>Restaurant</div>
      <div class="leg-row"><span class="leg-dot" style="background:${CATS.food.color}"></span>Quick/fast food</div>
      <div class="leg-row"><span class="leg-dot" style="background:${CATS.hotel.color}"></span>Hotel</div>
      <div class="leg-row"><span class="leg-line" style="background:#e0a458"></span>Driving route</div>
    `;
    return div;
  };
  legend.addTo(map);
}

function openNewPlaceForm(latlng){
  const popup = L.popup({maxWidth:260})
    .setLatLng(latlng)
    .setContent(buildFormHTML(null, latlng))
    .openOn(map);
  setTimeout(()=>attachFormHandlers(null, latlng), 0);
}

function buildFormHTML(place, latlng){
  const id = place ? place.id : null;
  const isEdit = !!place;
  return `
  <div class="pf" id="pf-${id||'new'}">
    <label>Name</label>
    <input type="text" id="pf-name" value="${place? esc(place.name):''}" placeholder="e.g. Moraine Lake">
    <label>Category</label>
    <select id="pf-cat">
      ${Object.entries(CATS).filter(([k])=>k!=='stop').map(([k,v])=>
        `<option value="${k}" ${place&&place.cat===k?'selected':''}>${v.label}</option>`).join('')}
    </select>
    <label>Notes</label>
    <textarea id="pf-note" placeholder="Reservation info, tips, hours...">${place? esc(place.note):''}</textarea>
    <label>Cost ($)</label>
    <input type="number" id="pf-cost" value="${place? place.cost:''}" placeholder="0" min="0" step="0.01">
    <div class="pfbtns">
      <button class="save" onclick="${isEdit? `savePlace('${id}')` : `createPlace(${latlng.lat},${latlng.lng})`}">Save</button>
      ${isEdit? `<button class="del" onclick="deletePlace('${id}')">Delete</button>` : ''}
    </div>
  </div>`;
}
function attachFormHandlers(){} // placeholder, inline handlers used instead

function esc(s){ return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function createPlace(lat,lng){
  const name = document.getElementById('pf-name').value.trim() || 'Untitled place';
  const cat = document.getElementById('pf-cat').value;
  const note = document.getElementById('pf-note').value;
  const cost = parseFloat(document.getElementById('pf-cost').value) || 0;
  const place = {id: 'p'+Date.now(), name, cat, note, cost, lat, lng};
  places.push(place);
  savePlaces(places);
  map.closePopup();
  renderAllMarkers();
  renderPlaces();
  renderBudget();
}

function savePlace(id){
  const p = places.find(p=>p.id===id);
  if(!p) return;
  p.name = document.getElementById('pf-name').value.trim() || 'Untitled place';
  p.cat = document.getElementById('pf-cat').value;
  p.note = document.getElementById('pf-note').value;
  p.cost = parseFloat(document.getElementById('pf-cost').value) || 0;
  savePlaces(places);
  map.closePopup();
  renderAllMarkers();
  renderPlaces();
  renderBudget();
}

function deletePlace(id){
  places = places.filter(p=>p.id!==id);
  savePlaces(places);
  map.closePopup();
  renderAllMarkers();
  renderPlaces();
  renderBudget();
}

function renderAllMarkers(){
  markersLayer.clearLayers();
  places.forEach(p=>{
    const icon = L.divIcon({
      className:'', html:`<div style="width:18px;height:18px;border-radius:50%;background:${CATS[p.cat].color};border:2px solid #0b1116;box-shadow:0 1px 4px rgba(0,0,0,0.5);"></div>`,
      iconSize:[18,18], iconAnchor:[9,9]
    });
    const m = L.marker([p.lat,p.lng], {icon}).addTo(markersLayer);
    m.bindPopup(buildFormHTML(p, {lat:p.lat,lng:p.lng}));
  });
}
renderAllMarkers_initial = true;

function focusPlace(id){
  const p = places.find(p=>p.id===id);
  if(!p) return;
  map.setView([p.lat,p.lng], 13);
  setTimeout(()=>{
    markersLayer.eachLayer(layer=>{
      const ll = layer.getLatLng();
      if(Math.abs(ll.lat-p.lat)<0.0001 && Math.abs(ll.lng-p.lng)<0.0001){
        layer.openPopup();
      }
    });
  }, 300);
}

/* ====================== SIDEBAR: TABS ====================== */
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tabpanel').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
  });
});

/* ====================== RENDER: ITINERARY ====================== */
function renderItinerary(){
  const byDay = {};
  stops.forEach(s=>{ (byDay[s.day] = byDay[s.day]||[]).push(s); });
  let html = '';
  Object.keys(byDay).sort().forEach(day=>{
    const dayStops = byDay[day];
    html += `<div class="day-card"><div class="dtitle">Day ${day}</div><div class="route">`;
    dayStops.forEach((s,i)=>{
      html += `${s.name}`;
      const legIdx = legs.findIndex(l=>l.from===s.name.replace(' (return)','').replace(' (day 4)',''));
      if(i < dayStops.length-1) html += ' →<br>';
    });
    html += `</div>`;
    // show legs relevant to this day's stops
    dayStops.forEach((s)=>{
      const cleanName = s.name.replace(' (return)','').replace(' (day 4)','');
      const leg = legs.find(l=>l.from===cleanName);
      if(leg) html += `<div class="leg">↳ to ${leg.to}: ${leg.time} (${leg.dist})</div>`;
    });
    if(day=='2'){
      html += `<div class="meals" style="border-top:1px dashed var(--border);"><div class="meal-row" style="margin-bottom:6px;"><span class="meal-tag" style="width:auto;">EN ROUTE STOPS</span></div>`;
      day2Stops.forEach((name,i)=>{
        html += `<div class="meal-row"><span class="meal-tag" style="width:18px;">${i+1}.</span><span class="meal-note">${name}</span></div>`;
      });
      html += `</div>`;
    }
    if(meals[day]){
      html += `<div class="meals">`;
      meals[day].forEach(m=>{
        html += `<div class="meal-row"><span class="meal-tag">${m.meal}</span><span class="meal-note">${m.note}</span></div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });
  document.getElementById('tab-itinerary').innerHTML = html;
}

/* ====================== RENDER: PLACES LIST ====================== */
function renderPlaces(){
  const el = document.getElementById('placesList');
  if(places.length===0){
    el.innerHTML = `<div class="empty">No places yet.<br>Click anywhere on the map to drop a pin for a lake, canyon, restaurant, or hotel.</div>`;
    return;
  }
  el.innerHTML = places.map(p=>`
    <div class="poi-item" onclick="focusPlace('${p.id}')">
      <div class="row">
        <span class="name">${esc(p.name)}</span>
        <span class="cat cat-${p.cat}">${CATS[p.cat].label}</span>
      </div>
      ${p.note? `<div class="note">${esc(p.note)}</div>`:''}
      ${p.cost? `<div class="cost">$${p.cost.toFixed(2)}</div>`:''}
    </div>
  `).join('');
}

/* ====================== RENDER: BUDGET ====================== */
function renderBudget(){
  const total = places.reduce((sum,p)=>sum+(p.cost||0),0);
  document.getElementById('budgetTotal').textContent = '$' + total.toFixed(2);
  const el = document.getElementById('budgetList');
  const withCost = places.filter(p=>p.cost>0).sort((a,b)=>b.cost-a.cost);
  if(withCost.length===0){
    el.innerHTML = `<div class="empty">No spending logged yet.<br>Add a cost when you create or edit a place pin.</div>`;
    return;
  }
  el.innerHTML = withCost.map(p=>`
    <div class="budget-row">
      <span class="bname">${esc(p.name)} <span style="color:var(--muted);font-size:10px;">(${CATS[p.cat].label})</span></span>
      <span class="bamt">$${p.cost.toFixed(2)}</span>
    </div>
  `).join('');
}
